name: bootstrap-apple

# One-time-ish bootstrap to wire the manually-issued APNs Auth Key (.p8) into
# Notification Hubs. Idempotent — re-run on key rotation or environment flip.
#
# Apple Developer portal steps (cannot be automated; Apple's UI is the only path):
#   1. Identifiers → register `my.pretty.pipeline` with Push Notifications.
#   2. Keys → create an APNs Auth Key, download the .p8, note the Key ID.
#   3. Membership → note your Team ID.
#
# Pre-flight secret (set before running):
#   gh secret set APNS_AUTH_KEY_P8 < /path/to/AuthKey_<KEY_ID>.p8
#
# Trigger from the Actions tab → "Run workflow", or:
#   gh workflow run bootstrap-apple.yml \
#     -f apns_key_id=ABCDEFGHIJ -f apple_team_id=K9HLM12NOP \
#     -f apns_environment=sandbox

on:
  workflow_dispatch:
    inputs:
      apns_key_id:
        description: '10-char Key ID from the APNs Auth Key (Apple Dev → Keys)'
        required: true
        type: string
      apple_team_id:
        description: '10-char Team ID (Apple Dev → Membership)'
        required: true
        type: string
      bundle_id:
        description: 'Bundle ID — must match the registered App ID and the app target'
        required: true
        type: string
        default: my.pretty.pipeline
      apns_environment:
        description: 'sandbox (Xcode/local debug) or production (TestFlight/App Store)'
        required: true
        type: choice
        options:
          - sandbox
          - production
        default: sandbox

permissions:
  id-token: write   # OIDC into Azure
  contents: read

jobs:
  wire-apns:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve NH namespace + hub names
        id: nh
        run: |
          RG="${{ vars.AZURE_RG_DEV }}"
          NH_NS=$(az notification-hub namespace list -g "$RG" --query "[0].name" -o tsv)
          NH_NAME=$(az notification-hub list -g "$RG" --namespace-name "$NH_NS" --query "[0].name" -o tsv)
          if [ -z "$NH_NS" ] || [ -z "$NH_NAME" ]; then
            echo "::error::Could not find NH namespace or hub in $RG — has cd-deploy run?"
            exit 1
          fi
          {
            echo "rg=$RG"
            echo "ns=$NH_NS"
            echo "hub=$NH_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Pick APNs endpoint
        id: endpoint
        run: |
          if [ "${{ inputs.apns_environment }}" = "production" ]; then
            echo "url=https://api.push.apple.com:443/3/device" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://api.sandbox.push.apple.com:443/3/device" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APNs token credential via NH data-plane
        # The Azure ARM management API at
        # `Microsoft.NotificationHubs/.../notificationHubs/{hub}` silently
        # discards `properties.apnsCredential` on every write — PUT/PATCH at
        # any api-version (2014, 2016, 2017, 2023-09-01, 2023-10-01-preview)
        # returns 200 OK with the credential field absent from the response.
        # `az notification-hub credential apns update` and `az deployment
        # group create` go through this same broken path. We confirmed the
        # break with raw curl; the management plane is genuinely unable to
        # set this field, despite the schema.
        #
        # The original NH admin surface — the Service Bus data-plane at
        # `{namespace}.servicebus.windows.net/{hub}` — does persist the
        # credential. It uses SAS auth and an Atom XML payload (legacy NH
        # protocol). NH push delivery reads from this surface, not from the
        # management plane, so push starts working immediately on success.
        #
        # NH parses the .p8 internally and only accepts the bare base64 body
        # (PEM headers stripped). Apple's APNs accepts full PEM, which is
        # why a raw curl probe of the same .p8 succeeds while NH fails.
        env:
          APNS_AUTH_KEY_P8: ${{ secrets.APNS_AUTH_KEY_P8 }}
          SUB: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          if [ -z "$APNS_AUTH_KEY_P8" ]; then
            echo "::error::Repo secret APNS_AUTH_KEY_P8 is empty. Set with: gh secret set APNS_AUTH_KEY_P8 < AuthKey_<KEY_ID>.p8"
            exit 1
          fi

          NS="${{ steps.nh.outputs.ns }}"
          HUB="${{ steps.nh.outputs.hub }}"
          RG="${{ steps.nh.outputs.rg }}"
          ENDPOINT_HOST="${NS}.servicebus.windows.net"

          APNS_TOKEN=$(printf '%s' "$APNS_AUTH_KEY_P8" | grep -v -- '-----' | tr -d '\r\n')
          TOKEN_LEN=${#APNS_TOKEN}
          if [ "$TOKEN_LEN" -lt 100 ] || [ "$TOKEN_LEN" -gt 1000 ]; then
            echo "::error::APNS_TOKEN length is $TOKEN_LEN — out of expected 200–600 range. Re-set the secret with: gh secret set APNS_AUTH_KEY_P8 < AuthKey_<KEY_ID>.p8"
            exit 1
          fi
          echo "APNS_TOKEN length=$TOKEN_LEN (sanity-passed; bare base64 body)."

          # Mint a SAS for the namespace's RootManageSharedAccessKey. This is
          # always present (created with the namespace), so we don't depend on
          # any hub-level rule existing yet.
          KEY=$(az rest --method POST \
            --url "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.NotificationHubs/namespaces/$NS/AuthorizationRules/RootManageSharedAccessKey/listKeys?api-version=2023-10-01-preview" \
            --query primaryKey -o tsv)

          RESOURCE_URI="https://$ENDPOINT_HOST/$HUB"
          EXPIRY=$(($(date +%s) + 600))
          ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$RESOURCE_URI")
          STRING_TO_SIGN="${ENCODED}"$'\n'"${EXPIRY}"
          SIG=$(printf '%s' "$STRING_TO_SIGN" | openssl dgst -binary -sha256 -hmac "$KEY" | openssl base64 -A)
          SIG_ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$SIG")
          SAS="SharedAccessSignature sr=$ENCODED&sig=$SIG_ENCODED&se=$EXPIRY&skn=RootManageSharedAccessKey"

          # Atom XML body — legacy NH wire format. Field names are PascalCase here.
          # Token holds the bare base64 body (stripped of PEM markers above).
          XML="<entry xmlns=\"http://www.w3.org/2005/Atom\"><content type=\"application/xml\"><NotificationHubDescription xmlns=\"http://schemas.microsoft.com/netservices/2010/10/servicebus/connect\"><ApnsCredential><Properties><Property><Name>Endpoint</Name><Value>${{ steps.endpoint.outputs.url }}</Value></Property><Property><Name>KeyId</Name><Value>${{ inputs.apns_key_id }}</Value></Property><Property><Name>AppName</Name><Value>${{ inputs.bundle_id }}</Value></Property><Property><Name>AppId</Name><Value>${{ inputs.apple_team_id }}</Value></Property><Property><Name>Token</Name><Value>$APNS_TOKEN</Value></Property></Properties></ApnsCredential></NotificationHubDescription></content></entry>"

          # Capture status + body separately so a non-200 lands in the log.
          OUT=$(curl -sS -w '\n%{http_code}' -X PUT "https://$ENDPOINT_HOST/$HUB?api-version=2014-09" \
            -H "Authorization: $SAS" \
            -H "Content-Type: application/atom+xml;type=entry;charset=utf-8" \
            -H "If-Match: *" \
            -H "x-ms-version: 2014-09" \
            --data-binary "$XML")
          STATUS=$(printf '%s' "$OUT" | tail -1)
          BODY=$(printf '%s' "$OUT" | sed '$d')

          if [ "$STATUS" != "200" ]; then
            echo "::error::Data-plane PUT returned HTTP $STATUS"
            printf '%s\n' "$BODY"
            exit 1
          fi

          # Parse the persisted KeyId out of the Atom response and assert it
          # matches what we sent. NH masks the Token in the response.
          STORED_KID=$(printf '%s' "$BODY" \
            | grep -oE '<Name>KeyId</Name><Value>[^<]+</Value>' \
            | sed -E 's|.*<Value>([^<]+)</Value>|\1|' \
            | head -1)
          if [ -z "$STORED_KID" ]; then
            echo "::error::Data-plane PUT returned 200 but no KeyId in response body."
            printf '%s\n' "$BODY"
            exit 1
          fi
          if [ "$STORED_KID" != "${{ inputs.apns_key_id }}" ]; then
            echo "::error::Persisted KeyId=$STORED_KID expected=${{ inputs.apns_key_id }}"
            exit 1
          fi
          echo "Persisted KeyId=$STORED_KID, AppName=${{ inputs.bundle_id }}, AppId=${{ inputs.apple_team_id }}, Endpoint=${{ steps.endpoint.outputs.url }}"

      - name: Note on management-plane visibility
        run: |
          echo "::notice::The Azure portal blade (Apple/APNS settings) and 'az rest GET .../notificationHubs/{hub}' query \`properties.apnsCredential\` will continue to show null. That's an Azure-side limitation: the management plane never reads the credential the data plane stores. Push delivery still works because NH itself reads from the data-plane state."

      - name: Preflight cd-testflight secrets
        # Non-blocking informational check so the operator knows whether
        # tagging v*.*.* will succeed once they're done here.
        env:
          K1: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          K2: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          K3: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          missing=()
          [ -z "$K1" ] && missing+=("APP_STORE_CONNECT_API_KEY_ID")
          [ -z "$K2" ] && missing+=("APP_STORE_CONNECT_API_ISSUER_ID")
          [ -z "$K3" ] && missing+=("APP_STORE_CONNECT_API_KEY_P8")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::cd-testflight will fail until these secrets are set: ${missing[*]}"
          else
            echo "All cd-testflight secrets present — tagging v*.*.* will reach TestFlight."
          fi

      - name: Summary
        run: |
          {
            echo "## Apple → Notification Hubs"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| RG | \`${{ steps.nh.outputs.rg }}\` |"
            echo "| Namespace | \`${{ steps.nh.outputs.ns }}\` |"
            echo "| Hub | \`${{ steps.nh.outputs.hub }}\` |"
            echo "| Bundle ID | \`${{ inputs.bundle_id }}\` |"
            echo "| APNs Key ID | \`${{ inputs.apns_key_id }}\` |"
            echo "| Team ID | \`${{ inputs.apple_team_id }}\` |"
            echo "| Environment | \`${{ inputs.apns_environment }}\` |"
            echo ""
            echo "Push delivery is wired end-to-end. Next: tag \`v0.1.0\` to trigger \`cd-testflight\`."
          } >> "$GITHUB_STEP_SUMMARY"
