name: cd-cloudflare

# Applies the Terraform layer under infra/cloudflare/. Manages the DNS
# records for the Function App custom domain (CNAME `func.<domain>` +
# the asuid TXT ownership challenge).
#
# Email Routing (alerts@<domain> → email-ingest Worker) moved to
# my.pretty.blender along with the Worker itself; this stack no longer
# touches it. The MX + SPF records stay CF-managed (auto-created when
# Email Routing is enabled), exactly as before.

on:
  push:
    branches: [main]
    paths:
      - 'infra/cloudflare/**'
      - '.github/workflows/cd-cloudflare.yml'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC to Azure for the AzureRM TF backend
  contents: read

concurrency:
  group: cd-cloudflare-dev
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # AzureRM provider in TF backend mode picks these up automatically
  # from the GH OIDC token + the env vars we set in the job.
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Azure login (OIDC) — used to resolve outputs that flow into TF vars
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve runtime inputs from Azure
        id: azure_outputs
        run: |
          set -eo pipefail
          RG='${{ vars.AZURE_RG_DEV }}'
          # Salted storage account hosting the tfstate container.
          STG=$(az storage account list -g "$RG" --query "[0].name" -o tsv)
          # Function App default hostname + customDomainVerificationId
          # for the asuid TXT.
          FN=$(az functionapp list -g "$RG" --query "[0].name" -o tsv)
          # `az functionapp show` nests these under `.properties.*`, unlike
          # `az functionapp list` which flattens them at the root — undocumented
          # az CLI inconsistency between `list` and `show`. Querying the wrong
          # path silently returns null + tsv-prints empty, leading TF to send
          # `content: ""` to CF and getting a cryptic 400 "Content for CNAME
          # record is invalid."
          HOST=$(az functionapp show -g "$RG" -n "$FN" --query properties.defaultHostName -o tsv)
          ASUID=$(az functionapp show -g "$RG" -n "$FN" --query properties.customDomainVerificationId -o tsv)
          # Fail loud on empty values — TF would otherwise apply with
          # `content: ""` and CF returns a misleading 400.
          [ -n "$FN" ]    || { echo "::error::function app not found in $RG"; exit 1; }
          [ -n "$HOST" ]  || { echo "::error::defaultHostName empty for $FN"; exit 1; }
          [ -n "$ASUID" ] || { echo "::error::customDomainVerificationId empty for $FN"; exit 1; }
          echo "::add-mask::$ASUID"
          {
            echo "storage_account=$STG"
            echo "function_hostname=$HOST"
            echo "function_asuid=$ASUID"
          } >> "$GITHUB_OUTPUT"

      - name: terraform init
        working-directory: infra/cloudflare
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.AZURE_RG_DEV }}" \
            -backend-config="storage_account_name=${{ steps.azure_outputs.outputs.storage_account }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=cloudflare.tfstate"

      - name: terraform validate
        working-directory: infra/cloudflare
        run: terraform validate

      - name: terraform apply
        working-directory: infra/cloudflare
        env:
          TF_VAR_domain:                                       ${{ vars.NOTIFY_DOMAIN }}
          TF_VAR_cloudflare_api_token:                         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_function_app_hostname:                        ${{ steps.azure_outputs.outputs.function_hostname }}
          TF_VAR_function_app_custom_domain_verification_id:   ${{ steps.azure_outputs.outputs.function_asuid }}
        run: terraform apply -auto-approve -input=false
