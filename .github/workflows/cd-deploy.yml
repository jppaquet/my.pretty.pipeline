name: cd-deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: write    # to invoke e2e.yml via workflow_call

concurrency:
  group: cd-deploy-dev
  cancel-in-progress: false

# Opt every JavaScript action in this workflow into the Node 24 runtime
# ahead of the June 2 2026 forced cutover. Some Azure-org actions
# (azure/arm-deploy@v2, azure/login@v3) still declare Node 20 in their
# action.yml and trip a deprecation warning on every run; this env var
# overrides that per the documented migration path:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Pass 1: deploy infra with all EG-function subscriptions disabled.
  # ARM validates EG sub endpoints against registered functions, which don't
  # exist on the Function App until publish-functions runs. Flex Consumption
  # has no deployment slots so we publish straight to production.
  deploy-infra:
    runs-on: ubuntu-24.04
    outputs:
      function_app_name: ${{ steps.outputs.outputs.functionAppName }}
      function_app_hostname: ${{ steps.outputs.outputs.functionAppHostname }}
      admin_swa_name: ${{ steps.outputs.outputs.adminSwaName }}
      admin_swa_hostname: ${{ steps.outputs.outputs.adminSwaHostname }}
      enable_archive_sub: ${{ steps.flags.outputs.archive }}
      enable_push_sub: ${{ steps.flags.outputs.push }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute EG-sub flags from feature-folder presence
        id: flags
        run: |
          # After the refactor in PR #46 every trigger lives under
          # src/Notify.Functions/<feature>/. Probe the matching folder for
          # an EG-trigger source file (the *Function.cs convention) so this
          # gate auto-flips when a future Phase 2/4 consumer ships its
          # trigger but stays inert until then.
          archive=false
          push=false
          [ -f "src/Notify.Functions/Archive/ArchiveFunction.cs" ] && archive=true
          [ -f "src/Notify.Functions/Push/PushFunction.cs" ] && push=true
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "push=${push}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infra (Bicep) — pass 1, EG subs disabled
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ vars.AZURE_RG_DEV }}
          template: infra/main.bicep
          # `adminEntra*` empty by default — admin plane stays disabled
          # until the maintainer runs the Entra bootstrap and sets the
          # `ADMIN_AAD_AUDIENCE` repo variable. tenantId reuses the same var
          # `azure/login` is already pulling from.
          parameters: env=dev enableArchiveSubscription=false enablePushSubscription=false adminEntraTenantId=${{ vars.AZURE_TENANT_ID }} adminEntraAudience=${{ vars.ADMIN_AAD_AUDIENCE }}
          failOnStdErr: false

      - name: Capture outputs
        id: outputs
        run: |
          NAME="${{ steps.deploy.outputs.functionAppName }}"
          HOST="${{ steps.deploy.outputs.functionAppHostname }}"
          SWA_NAME="${{ steps.deploy.outputs.adminSwaName }}"
          SWA_HOST="${{ steps.deploy.outputs.adminSwaHostname }}"
          echo "functionAppName=${NAME:-}" >> "$GITHUB_OUTPUT"
          echo "functionAppHostname=${HOST:-}" >> "$GITHUB_OUTPUT"
          echo "adminSwaName=${SWA_NAME:-}" >> "$GITHUB_OUTPUT"
          echo "adminSwaHostname=${SWA_HOST:-}" >> "$GITHUB_OUTPUT"

  # Single Function App, single project (Notify.Functions). Earlier matrix
  # publishes overwrote each other on Flex (one zip per Function App), so we
  # collapsed to one project that contains every trigger.
  publish-functions:
    needs: deploy-infra
    if: needs.deploy-infra.outputs.function_app_name != ''
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Azure login (OIDC)
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build Notify.Functions
        run: |
          set -eo pipefail
          dotnet publish src/Notify.Functions/Notify.Functions.csproj \
            -c Release -o ./publish

      # Azure/functions-action handles Flex Consumption deployment correctly
      # via Run-From-Package + storage SAS.
      - name: Publish to Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infra.outputs.function_app_name }}
          package: ./publish

      # Flex registers triggers asynchronously after publish-action returns.
      # ARM's EG-sub validation in pass 2 needs to see push/archive/Ingest
      # functions on the app — wait for the host to surface them.
      - name: Wait for triggers to register
        run: |
          set -eo pipefail
          subId=$(az account show --query id -o tsv)
          rg='${{ vars.AZURE_RG_DEV }}'
          name='${{ needs.deploy-infra.outputs.function_app_name }}'
          # Force the host to re-sync triggers, then poll until our two EG
          # triggers (archive, push) appear. Cap at ~3 min.
          az rest --method post \
            --url "https://management.azure.com/subscriptions/${subId}/resourceGroups/${rg}/providers/Microsoft.Web/sites/${name}/syncfunctiontriggers?api-version=2023-12-01" \
            >/dev/null 2>&1 || true
          for i in $(seq 1 36); do
            list=$(az rest --method get \
              --url "https://management.azure.com/subscriptions/${subId}/resourceGroups/${rg}/providers/Microsoft.Web/sites/${name}/functions?api-version=2023-12-01" \
              --query 'value[].name' -o tsv 2>/dev/null || echo '')
            echo "attempt ${i}: ${list}"
            if echo "$list" | grep -q '/archive$' && echo "$list" | grep -q '/push$'; then
              echo "archive + push registered"; exit 0
            fi
            sleep 5
          done
          echo "::warning::archive/push not visible after 3 min — pass 2 may fail"

  # Pass 2: re-deploy infra with EG subs enabled now that the function endpoints
  # are registered. Skipped when neither archive nor push project exists yet.
  enable-eventgrid-subs:
    needs: [deploy-infra, publish-functions]
    if: |
      success() &&
      (needs.deploy-infra.outputs.enable_archive_sub == 'true' ||
       needs.deploy-infra.outputs.enable_push_sub == 'true')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infra (Bicep) — pass 2, EG subs enabled
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ vars.AZURE_RG_DEV }}
          template: infra/main.bicep
          parameters: >-
            env=dev
            enableArchiveSubscription=${{ needs.deploy-infra.outputs.enable_archive_sub }}
            enablePushSubscription=${{ needs.deploy-infra.outputs.enable_push_sub }}
            adminEntraTenantId=${{ vars.AZURE_TENANT_ID }}
            adminEntraAudience=${{ vars.ADMIN_AAD_AUDIENCE }}
          failOnStdErr: false

  # Admin SPA upload. Only the `admin/` static content; no backend.
  # Renders config.template.js → config.js with deploy-time values (tenant,
  # client id, api base) before upload so the bundle stays generic in the
  # repo but is fork-specific at runtime. Skipped unless the maintainer has
  # set `ADMIN_AAD_AUDIENCE` (admin plane disabled otherwise — see PR-1).
  publish-admin-swa:
    needs: [deploy-infra, publish-functions]
    if: |
      success() &&
      needs.deploy-infra.outputs.admin_swa_name != '' &&
      vars.ADMIN_AAD_AUDIENCE != ''
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Render runtime config
        run: |
          set -eo pipefail
          sed -e "s|__TENANT_ID__|${{ vars.AZURE_TENANT_ID }}|g" \
              -e "s|__CLIENT_ID__|${{ vars.ADMIN_AAD_AUDIENCE }}|g" \
              -e "s|__API_BASE__|https://${{ needs.deploy-infra.outputs.function_app_hostname }}|g" \
              admin/config.template.js > admin/config.js

      - name: Fetch SWA deploy token
        id: token
        run: |
          set -eo pipefail
          # SWA deploy token is an account-scoped secret retrievable via
          # control-plane RBAC (Contributor on the SWA resource — the
          # cd-deploy MI already has this via the RG-scoped grant). Captured
          # as a step output and consumed only by the upload action below.
          T=$(az staticwebapp secrets list \
            --name "${{ needs.deploy-infra.outputs.admin_swa_name }}" \
            -g "${{ vars.AZURE_RG_DEV }}" \
            --query 'properties.apiKey' -o tsv)
          echo "::add-mask::$T"
          echo "deploy_token=$T" >> "$GITHUB_OUTPUT"

      - name: Upload admin/ to SWA
        # Pinned to commit SHA (current v1) per CodeQL "Unpinned tag for a
        # 3rd-party Action" advisory. Re-resolve via
        #   gh api repos/Azure/static-web-apps-deploy/git/ref/tags/v1
        # when bumping the major; keep the trailing `# v1` comment in sync
        # so the version is greppable.
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.deploy_token }}
          action: upload
          app_location: admin
          # No build step needed — admin/ is pre-rendered (config.js was
          # substituted in an earlier workflow step). `skip_app_build` is
          # the only documented bypass; `api_location` is left unset, so
          # no api-build runs either (the action only builds an api when
          # an api_location is given).
          skip_app_build: true

  # E2E runs against the deployed Function App after EG subs (if any) are
  # in place. Without a staging slot, "production" is the only target.
  e2e:
    needs: [deploy-infra, publish-functions, enable-eventgrid-subs]
    if: |
      always() &&
      needs.deploy-infra.result == 'success' &&
      needs.publish-functions.result == 'success' &&
      (needs.enable-eventgrid-subs.result == 'success' || needs.enable-eventgrid-subs.result == 'skipped')
    uses: ./.github/workflows/e2e.yml
    with:
      target_hostname: ${{ needs.deploy-infra.outputs.function_app_hostname }}
      slot: production
    secrets: inherit
