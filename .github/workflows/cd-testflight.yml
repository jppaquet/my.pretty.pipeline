name: cd-testflight

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive-and-upload:
    runs-on: macos-15
    defaults:
      run:
        working-directory: app

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      MARKETING_VERSION: ${{ github.ref_name }}
      # github.run_number is monotonic per workflow, which is what TestFlight
      # needs in CFBundleVersion (re-uploading the same number is rejected).
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v6

      # ASC now mandates the iOS 26 SDK (Xcode 26) for any upload. The macos-15
      # runner ships multiple Xcodes: default is Xcode 16; Xcode 26 is present
      # but only as version-suffixed paths (Xcode_26.0.app, Xcode_26.1.1.app, …)
      # with no plain `Xcode_26.app` symlink. Glob and pick the highest 26.x.
      - name: Select latest Xcode 26.x
        run: |
          LATEST=$(/bin/ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No Xcode 26.x on runner — installed Xcodes:" >&2
            /bin/ls -d /Applications/Xcode*.app 2>&1 || true
            exit 1
          fi
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Write App Store Connect API key
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          # `~` doesn't expand inside double quotes; use $HOME explicitly.
          echo "$APP_STORE_CONNECT_API_KEY_P8" > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      # PR-C retired the legacy `NotifyFunctionKey` plist injection — the iOS
      # bundle no longer carries a backend credential. Auth is Sign-in-with-
      # Apple end-to-end: the user signs in on first launch, the identity
      # token is exchanged at /v1/auth/session for a 30-day Notify session
      # JWT, and every other backend call goes out with `Authorization:
      # Bearer <session JWT>`. The Function App's JwtAuthMiddleware validates
      # the session signature against the KV-backed signing key. Nothing to
      # inject here.

      - name: Archive
        run: |
          set -o pipefail
          VER="${MARKETING_VERSION#v}"
          xcodebuild archive \
            -project Notify.xcodeproj \
            -scheme Notify \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Notify.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER_ID" \
            MARKETING_VERSION="$VER" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            | xcpretty

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>destination</key><string>upload</string>
            <key>signingStyle</key><string>automatic</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Notify.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Publish GitHub release with build number
        # Lands the TestFlight build number on the release notes so the tag
        # → build mapping is recoverable without opening App Store Connect.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}
        run: |
          NOTES="TestFlight build ${BUILD_NUMBER} uploaded for ${MARKETING_VERSION}."
          if gh release view "$MARKETING_VERSION" >/dev/null 2>&1; then
            gh release edit "$MARKETING_VERSION" --notes "$NOTES"
          else
            gh release create "$MARKETING_VERSION" --title "$MARKETING_VERSION" --notes "$NOTES"
          fi
