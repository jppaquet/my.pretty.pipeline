name: ci-app

on:
  # Opt-in: macos-15 runners are 10x billing minutes. Only auto-run when
  # actual iOS code changes; force a run on any PR via "Run workflow"
  # in the Actions tab (workflow_dispatch).
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/ci-app.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        destination:
          - 'platform=iOS Simulator,name=iPhone 16'
          - 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)'

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode + simulator inventory
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      - name: Install swiftlint
        run: brew list swiftlint >/dev/null 2>&1 || brew install swiftlint

      - name: SwiftLint (strict)
        run: swiftlint --strict --reporter github-actions-logging

      - name: Run tests on ${{ matrix.destination }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project Notify.xcodeproj \
            -scheme Notify \
            -destination '${{ matrix.destination }}' \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-xcresult-${{ strategy.job-index }}
          path: app/TestResults.xcresult
          retention-days: 7
