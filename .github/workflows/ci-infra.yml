name: ci-infra

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - 'infra/**'
              - '.github/workflows/ci-infra.yml'

  bicep-build:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Bicep CLI
        run: |
          curl -sSLO https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep-linux-x64
          sudo mv bicep-linux-x64 /usr/local/bin/bicep
          bicep --version

      - name: Lint + build all .bicep files
        run: |
          set -eo pipefail
          fail=0
          while IFS= read -r f; do
            echo "::group::bicep build $f"
            bicep build --no-restore "$f" || fail=1
            echo "::endgroup::"
          done < <(find infra -name '*.bicep' -type f)
          exit $fail
