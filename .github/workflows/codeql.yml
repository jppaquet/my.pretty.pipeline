name: CodeQL

# `run-name` shows up as each row's title in the Actions list. The same
# workflow fires twice per merge cycle (once on the PR `pull_request` event,
# once on the post-merge `push` to main); without this, both rows render as
# "CodeQL" + the commit message and look like duplicates. Including the event
# kind + ref makes each row self-describing.
run-name: CodeQL · ${{ github.event_name }} · ${{ github.head_ref || github.ref_name }}

# Replaces GitHub's "Default setup" for CodeQL. Default setup re-runs the full
# autobuild on every push, doesn't cancel stale runs, ignores path filters,
# and (worst) re-spins the macos-15 Swift runner for any code change — 15+
# min of mostly idle waiting when you've only touched a YAML.
#
# This version computes a dynamic matrix: only the languages whose paths
# changed get analyzed. Schedule runs (the weekly baseline) always cover all
# three languages.
#
# IMPORTANT: before merging this PR, disable Default setup in
#   Settings → Code security → Code scanning → CodeQL → Default setup → Disable
# Otherwise both setups run in parallel and double the CI cost.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
  schedule:
    # Weekly baseline so a quiet `main` still gets an analysis on the latest
    # CodeQL query suite. Monday 07:24 UTC = off-peak for everyone.
    - cron: '24 7 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  # PRs cancel stale runs aggressively. Main pushes also cancel — security
  # baselines care about latest HEAD, not every intermediate commit, and the
  # weekly schedule fills any gap if main goes quiet.
  group: codeql-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Decide which languages to analyze. Outputs a JSON `include:` array that
  # `analyze` consumes as its matrix; an empty array short-circuits the
  # whole job. Schedule events force all three languages on.
  changes:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            csharp:
              - 'src/**'
              - '.github/workflows/codeql.yml'
            swift:
              - 'app/**'
              - '.github/workflows/codeql.yml'
            actions:
              - '.github/**'

      - name: Build dynamic matrix
        id: build_matrix
        env:
          IS_SCHEDULE: ${{ github.event_name == 'schedule' }}
          CSHARP_CHANGED: ${{ steps.filter.outputs.csharp }}
          SWIFT_CHANGED:  ${{ steps.filter.outputs.swift }}
          ACTIONS_CHANGED: ${{ steps.filter.outputs.actions }}
        run: |
          set -eo pipefail
          INCLUDES='[]'

          if [ "$CSHARP_CHANGED" = "true" ] || [ "$IS_SCHEDULE" = "true" ]; then
            INCLUDES=$(echo "$INCLUDES" | jq -c '. += [{"language":"csharp","runs-on":"ubuntu-24.04","build-mode":"none"}]')
          fi
          if [ "$SWIFT_CHANGED" = "true" ] || [ "$IS_SCHEDULE" = "true" ]; then
            INCLUDES=$(echo "$INCLUDES" | jq -c '. += [{"language":"swift","runs-on":"macos-15","build-mode":"manual"}]')
          fi
          if [ "$ACTIONS_CHANGED" = "true" ] || [ "$IS_SCHEDULE" = "true" ]; then
            INCLUDES=$(echo "$INCLUDES" | jq -c '. += [{"language":"actions","runs-on":"ubuntu-24.04","build-mode":"none"}]')
          fi

          MATRIX=$(echo "{\"include\":$INCLUDES}" | jq -c .)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "computed matrix: $MATRIX"

  analyze:
    needs: changes
    # Empty include[] = no languages to analyze; skip the whole job so we
    # don't spin up a runner just to declare success.
    if: needs.changes.outputs.matrix != '{"include":[]}'
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      # Swift is the only language that still needs a manual build step.
      # Skip code signing — CodeQL only needs the compiled artifacts to
      # build its database, not a runnable .app.
      - name: Build (Swift)
        if: matrix.language == 'swift'
        run: |
          xcodebuild \
            -project app/Notify.xcodeproj \
            -scheme Notify \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
