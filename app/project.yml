name: Notify
options:
  bundleIdPrefix: my.pretty.pipeline
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.0.1"
targets:
  Notify:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Notify
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: my.pretty.pipeline
        TARGETED_DEVICE_FAMILY: "1,2"  # 1=iPhone, 2=iPad — universal app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIBackgroundModes: "remote-notification"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Notify/Notify.entitlements
      properties:
        aps-environment: development
  NotifyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NotifyTests
    dependencies:
      - target: Notify
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: my.pretty.pipeline.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Notify.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Notify"
        BUNDLE_LOADER: "$(TEST_HOST)"
  NotifyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NotifyUITests
    dependencies:
      - target: Notify
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: my.pretty.pipeline.uitests
        TEST_TARGET_NAME: Notify
schemes:
  Notify:
    build:
      targets:
        Notify: all
        NotifyTests: [test]
        NotifyUITests: [test]
    test:
      targets:
        - NotifyTests
        - NotifyUITests
      gatherCoverageData: true
