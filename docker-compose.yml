# Local Cosmos emulator for integration tests. Mirrors the `cosmos` service
# block in .github/workflows/ci-functions.yml so what passes in CI passes
# locally (and vice versa).
#
# Usage:
#   docker compose up -d                                # boot emulator, wait for healthy
#   cd src && dotnet test --filter Category=Integration # Archive + Inbox + Auth suites
#   docker compose down -v                              # tear down + clear emulator state
#
# Test fixtures default to `https://localhost:8081` (CosmosEmulatorFixture.cs)
# so no env vars are needed — pure unit tests run via `dotnet test --filter
# Category!=Integration` without the emulator up.
#
# Apple Silicon note: the published image is amd64 only; Docker Desktop runs
# it through Rosetta on M-series Macs. Startup is slow (60–120 s); once
# healthy, integration tests run in a few seconds. If you need a faster
# path, Microsoft's `vnext-preview` tag has ARM support but different
# defaults — switching needs fixture updates.

services:
  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: notify-cosmos
    environment:
      # Bumped from 3 to 10 to match ci-functions.yml. Three was tight for
      # two integration-test assemblies and tipped the emulator into 503s
      # once Auth tests were added. Ten gives enough physical partitions
      # to keep CreateDatabase + CreateContainer under the client timeout
      # even with the per-test-method containers ProjectsAdminHandlerTests
      # creates.
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "10"
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "false"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "127.0.0.1"
    ports:
      - "8081:8081"
      - "10250-10254:10250-10254"
    healthcheck:
      test: ["CMD-SHELL", "curl -kf https://localhost:8081/_explorer/emulator.pem || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 90s
