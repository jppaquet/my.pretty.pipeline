# Cloudflare Worker — email-ingest.
# Triggered by inbound emails to alerts@<domain> via Cloudflare Email
# Routing. The matching routing rule lives in infra/cloudflare/email-routing.tf
# and references this Worker by `name` below — keep them in sync.
#
# `account_id` is intentionally NOT hardcoded here. Wrangler picks it up
# from CLOUDFLARE_ACCOUNT_ID env var, which cd-worker.yml supplies from a
# GitHub repo secret. Same rationale as infra/cloudflare/variables.tf:
# this repo is public, so the only values in version control are
# non-secret resource shapes.

name = "email-ingest"
main = "src/index.ts"
compatibility_date = "2026-01-15"

# Workers logs (observability) — cheap insurance for a service that runs
# on inbound email and would otherwise be invisible when it misbehaves.
[observability]
enabled = true

# Runtime vars are set at deploy via `wrangler deploy --var KEY:VALUE`:
#   - INGEST_URL              → https://func.<domain>/v1/notifications
#   - FORWARD_VERIFICATION_TO → maintainer's verified destination address
#   - ALLOWED_SENDERS         → comma-separated From whitelist
# INGEST_API_KEY is a Worker SECRET set out-of-band via
# `wrangler secret put INGEST_API_KEY` after the `google-alerts` project
# is registered via the admin plane.
